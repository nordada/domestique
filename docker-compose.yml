# Compose file for running Domestique - works on any Docker host (Unraid,
# Synology, plain Linux, macOS via Docker Desktop/Colima, etc).
#
# All host-specific values (paths, port) live in .env, not here - copy
# .env.example to .env and fill it in before running `docker compose up`.
#
# IMPORTANT: the "dir" value Transmission passes to torrent-done.sh (via
# TR_TORRENT_DIR) has to resolve to the same file inside THIS container as it
# does inside Transmission's own container. Transmission's own Docker
# template maps its downloads share to /downloads internally (on Unraid,
# check your Transmission container's path mappings in the Docker tab;
# elsewhere, check its own compose file/run command), so this container
# mounts the SAME host directory at that SAME container path below -
# DOWNLOADS_DIR in .env is the host path, but it always lands at the fixed
# container path /downloads here, matching Transmission's side. If your
# Transmission container uses a different internal path, change the
# ":/downloads" below to match it instead.
#
# "name" is pinned explicitly (rather than left to default to the containing
# folder's basename) so the Compose project identity - and therefore this
# container's lifecycle management - stays stable even if the deployment
# folder on the host gets renamed or moved.
name: domestique
services:
  domestique:
    build: .
    container_name: domestique
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      LIBRARY_ROOT: ${LIBRARY_ROOT}
      CONFIG_PATH: ${CONFIG_CONTAINER_PATH}
      SETTINGS_PATH: ${SETTINGS_CONTAINER_PATH}
      PORT: "${PORT}"
      # Optional Plex/Discord/hot-folder integrations - safe to leave unset,
      # the app just disables each feature when its required vars aren't all
      # present. These are a ONE-TIME SEED ONLY: the first time
      # config/settings.json doesn't exist yet, it's created from whatever's
      # set here; after that the file is authoritative and these env vars are
      # ignored, since the web UI's Settings panel is the live way to change
      # them from then on (see the README).
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_SECTION_ID: ${PLEX_SECTION_ID:-}
      PLEX_LIBRARY_ROOT: ${PLEX_LIBRARY_ROOT:-}
      # See the read-write bind mount below: hot-folder ingestion needs its
      # own mount because the main /downloads mount above is read-only.
      HOTFOLDER_DIR: ${HOTFOLDER_DIR:-}
      HOTFOLDER_POLL_INTERVAL_MS: ${HOTFOLDER_POLL_INTERVAL_MS:-}
      HOTFOLDER_STABLE_POLLS: ${HOTFOLDER_STABLE_POLLS:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_MENTION_USER_ID: ${DISCORD_MENTION_USER_ID:-}
      # Optional web UI (config editor, match tester, activity log) at
      # /ui. Unlike the integrations above, leaving this unset does NOT
      # leave the UI reachable without a password - its routes respond 503
      # until WEBUI_PASSWORD is set, since it exposes read/write config
      # access over HTTP.
      WEBUI_PASSWORD: ${WEBUI_PASSWORD:-}
      WEBUI_USER: ${WEBUI_USER:-}
      # Optional: run the app as this user/group instead of root
      # (linuxserver.io-style PUID/PGID convention; on Unraid 99/100 is the
      # usual nobody:users pair). Unset = run as root, the original
      # behavior. BEFORE enabling on an existing install, read the README's
      # "Running as a non-root user" section - the library (and hot-folder,
      # if used) need a one-time chown or the app can't write to them.
      PUID: ${PUID:-}
      PGID: ${PGID:-}
    volumes:
      # Transmission's completed-downloads share (read-only: we only copy from here).
      # Mounted at /downloads to match Transmission's own internal path.
      - ${DOWNLOADS_DIR}:/downloads:ro
      # Hot-folder drop zone (read-write, unlike the mount above): a more
      # specific bind mount layered on top of the read-only one, so ONLY
      # this subtree is writable - needed to move processed originals into
      # its own processed/ subfolder. Only takes effect if HOTFOLDER_DIR is
      # set to this same path in .env; otherwise it's just an unused empty
      # directory. Do NOT merge this into the read-only mount above - that
      # would make the whole Transmission share writable.
      - ${DOWNLOADS_DIR}/domestique:/downloads/domestique
      # Plex library root (read-write: this is where renamed files land).
      - ${LIBRARY_ROOT}:${LIBRARY_ROOT}
      # Config file bind-mounted so you can edit show mappings without rebuilding the image.
      - ./config/events.json:${CONFIG_CONTAINER_PATH}
      # Plex/Discord/hot-folder settings, editable live via the web UI's
      # Settings panel - bind-mounted so edits (and the one-time seed from
      # the PLEX_*/DISCORD_*/HOTFOLDER_* env vars above) persist across
      # container recreation. Gitignored: unlike events.json this holds live
      # secrets once set.
      # IMPORTANT (first run only): unlike events.json, this file doesn't
      # ship in the repo - if ./config/settings.json doesn't exist on the
      # HOST before the very first `docker compose up`, Docker creates an
      # empty DIRECTORY there instead of a file (a well-known bind-mount
      # gotcha), which the app can't clean up from inside the container
      # (it's the actual mount point). Avoid it entirely with `touch
      # config/settings.json` before your first `docker compose up` here.
      - ./config/settings.json:${SETTINGS_CONTAINER_PATH}
      # Web UI static assets, bind-mounted read-only for the same reason as
      # config/events.json above - HTML/CSS/JS tweaks take effect on the next
      # request without an image rebuild.
      - ./public:/app/public:ro
